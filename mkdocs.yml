site_name: kkl07090 · 전공지식 & 포트폴리오
site_url: https://kkl07090.github.io/
site_author: kkl07090
site_description: >-
  머신러닝/딥러닝, 시계열, 수리통계, 금융 지식 정리와 프로젝트 포트폴리오.
repo_url: https://github.com/kkl07090/kkl07090.github.io
repo_name: kkl07090.github.io
copyright: Copyright &copy; 2026 kkl07090

theme:
  name: material
  language: ko
  features:
    - navigation.tabs          # 상단 탭 메뉴
    - navigation.sections      # 좌측 섹션 그룹
    - navigation.indexes       # 섹션 제목이 index.md로 연결
    - navigation.top           # 맨 위로 버튼
    - navigation.footer        # 이전/다음 글 이동
    - search.suggest
    - search.highlight
    - content.code.copy        # 코드 복사 버튼
    - content.code.annotate    # 코드 주석
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ko
        - en
  - blog:
      blog_dir: blog
      post_url_format: "{date}/{slug}"
      post_excerpt: optional

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:      # 수식(LaTeX) 지원
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - assets/stylesheets/extra.css

nav:
  - 홈: index.md
  - 소개 · 이력: about/resume.md
  - ML · DL:
      - ml-dl/index.md
      - 경사하강법: ml-dl/gradient-descent.md
  - 시계열:
      - time-series/index.md
      - ARIMA: time-series/arima.md
  - 수리통계:
      - statistics/index.md
      - 최대우도추정(MLE): statistics/mle.md
  - 금융:
      - finance/index.md
      - 핵심 지표 용어: finance/key-metrics.md
  - 블로그: blog/index.md
  - 프로젝트:
      - projects/index.md
      - 예시 프로젝트: projects/sample-project/index.md
