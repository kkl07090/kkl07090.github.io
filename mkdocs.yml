site_name: KIM GEON RYUL
site_url: https://kkl07090.github.io/
site_author: KIM GEON RYUL
site_description: >-
  Portfolio & study notes — ML/DL, Time Series, Mathematical Statistics, Finance.
repo_url: https://github.com/kkl07090/kkl07090.github.io
repo_name: kkl07090.github.io
copyright: Copyright &copy; 2026 KIM GEON RYUL

theme:
  name: material
  language: en
  custom_dir: overrides        # 커스텀 헤더(상단 네비)
  font: false                  # 폰트는 extra.css에서 직접 지정 (Nunito)
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
  palette:
    scheme: default            # 라이트(따뜻한 크림)

plugins:
  - blog:
      blog_dir: blog
      post_url_format: "{date}/{slug}"
      post_excerpt: optional

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - assets/javascripts/flow.js

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - CV: cv.md
  - Project History:
      - projects/index.md
      - Sample Project: projects/sample-project/index.md
  - Major Knowledge:
      - major-knowledge.md
      - Note Template: template.md
      - ML · DL:
          - ml-dl/index.md
          - Gradient Descent: ml-dl/gradient-descent.md
      - Time Series:
          - time-series/index.md
          - ARIMA: time-series/arima.md
      - Mathematical Statistics:
          - statistics/index.md
          - Maximum Likelihood (MLE): statistics/mle.md
      - Finance:
          - finance/index.md
          - Key Metrics: finance/key-metrics.md
  - Gallery: gallery.md
  - Research Paper: research.md
